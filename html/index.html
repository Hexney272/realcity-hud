<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RealCity HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ===== Újrahasznosítható egyedi SVG ikonkészlet ===== -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <!-- státusz -->
            <symbol id="ic-health" viewBox="0 0 24 24">
                <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l8.8 8.8 8.8-8.8a5.5 5.5 0 0 0 0-7.8z"/>
            </symbol>
            <symbol id="ic-armor" viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
            </symbol>
            <symbol id="ic-hunger" viewBox="0 0 24 24">
                <path d="M3 11h18a9 9 0 0 1-18 0z"/>
                <path d="M5.5 11a6.5 6.5 0 0 1 13 0"/>
                <path d="M12 2.5v2M9.2 4.2l.8 1.8M14.8 4.2l-.8 1.8"/>
            </symbol>
            <symbol id="ic-thirst" viewBox="0 0 24 24">
                <path d="M12 2.7l5.7 5.6a8 8 0 1 1-11.3 0z"/>
            </symbol>
            <symbol id="ic-stamina" viewBox="0 0 24 24">
                <path d="M13 2 3 14h8l-1 8 11-13h-8z"/>
            </symbol>
            <symbol id="ic-oxygen" viewBox="0 0 24 24">
                <circle cx="10" cy="13" r="5"/>
                <circle cx="18" cy="7.5" r="2.5"/>
            </symbol>
            <symbol id="ic-voice" viewBox="0 0 24 24">
                <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                <path d="M19 11a7 7 0 0 1-14 0M12 18v3M8.5 21h7"/>
            </symbol>
            <symbol id="ic-users" viewBox="0 0 24 24">
                <path d="M16 20v-1.5a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4V20"/>
                <circle cx="9" cy="7" r="3.2"/>
                <path d="M22 20v-1.5a4 4 0 0 0-3-3.8M16 3.3a4 4 0 0 1 0 7.4"/>
            </symbol>
            <!-- pénz -->
            <symbol id="ic-cash" viewBox="0 0 24 24">
                <rect x="2" y="6" width="20" height="12" rx="2"/>
                <circle cx="12" cy="12" r="2.5"/>
                <path d="M6 9v6M18 9v6"/>
            </symbol>
            <symbol id="ic-bank" viewBox="0 0 24 24">
                <path d="M3 21h18M4 10h16M12 3 4 7v3h16V7z"/>
                <path d="M6 10v8M10 10v8M14 10v8M18 10v8"/>
            </symbol>
            <symbol id="ic-black" viewBox="0 0 24 24">
                <path d="M8 3h8l-1.4 4H9.4z"/>
                <path d="M7 7c-2 2-3.5 5-3.5 8A5.5 5.5 0 0 0 9 20.5h6A5.5 5.5 0 0 0 20.5 15c0-3-1.5-6-3.5-8"/>
                <path d="M12 11.5v5M10 13.5h4"/>
            </symbol>
            <symbol id="ic-rc" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 6.5l1.6 3.2 3.5.5-2.5 2.5.6 3.5-3.2-1.7-3.2 1.7.6-3.5L6.9 10.2l3.5-.5z"/>
            </symbol>
            <symbol id="ic-star" viewBox="0 0 24 24">
                <path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.4l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95z"/>
            </symbol>
        </defs>
    </svg>

    <div id="hud" class="hidden">

        <!-- ===================== SZERVER (bal felül) ===================== -->
        <section id="server" class="card module-server">
            <div class="server-logo">
                <span class="logo-real">Real</span><span class="logo-city">City</span>
            </div>
            <div class="server-meta">
                <div class="server-players">
                    <svg class="meta-ico"><use href="#ic-users"/></svg>
                    <span id="srv-players">0</span><span class="muted">/<span id="srv-max">48</span></span>
                </div>
                <div class="server-id">
                    <span class="muted">ID</span> <span id="srv-id">--</span>
                </div>
            </div>
        </section>

        <!-- ===================== PÉNZ (jobb felül) ===================== -->
        <section id="money" class="card module-money">
            <div class="money-row" data-acc="cash">
                <svg class="money-ico"><use href="#ic-cash"/></svg>
                <span class="money-val" id="money-cash">0 Ft</span>
                <span class="money-pop" id="pop-cash"></span>
            </div>
            <div class="money-row" data-acc="bank">
                <svg class="money-ico"><use href="#ic-bank"/></svg>
                <span class="money-val" id="money-bank">0 Ft</span>
                <span class="money-pop" id="pop-bank"></span>
            </div>
            <div class="money-row" data-acc="black">
                <svg class="money-ico"><use href="#ic-black"/></svg>
                <span class="money-val" id="money-black">0 Ft</span>
                <span class="money-pop" id="pop-black"></span>
            </div>
            <div class="money-row rc" data-acc="rc">
                <svg class="money-ico"><use href="#ic-rc"/></svg>
                <span class="money-val" id="money-rc">0 RC</span>
                <span class="money-pop" id="pop-rc"></span>
            </div>

            <!-- Játékos szint (LvL) az RC alatt -->
            <div class="level-chip" id="level-chip">
                <svg class="lvl-ico"><use href="#ic-star"/></svg>
                <div class="lvl-info">
                    <div class="lvl-top">
                        <span class="lvl-label">Szint</span>
                        <span class="lvl-num" id="lvl-num">1</span>
                    </div>
                    <div class="lvl-bar-track">
                        <div class="lvl-bar-fill" id="lvl-bar"></div>
                    </div>
                </div>
                <span class="lvl-xp" id="lvl-xp">0 / 100</span>
            </div>
        </section>

        <!-- ===================== STÁTUSZ (bal alul) ===================== -->
        <section id="status" class="module-status">
            <div class="status-ring" data-stat="health" title="Élet">
                <svg class="ring-ico"><use href="#ic-health"/></svg>
                <span class="ring-val" id="st-health">100</span>
            </div>
            <div class="status-ring" data-stat="armor" title="Páncél">
                <svg class="ring-ico"><use href="#ic-armor"/></svg>
                <span class="ring-val" id="st-armor">0</span>
            </div>
            <div class="status-ring" data-stat="hunger" title="Éhség">
                <svg class="ring-ico"><use href="#ic-hunger"/></svg>
                <span class="ring-val" id="st-hunger">100</span>
            </div>
            <div class="status-ring" data-stat="thirst" title="Szomjúság">
                <svg class="ring-ico"><use href="#ic-thirst"/></svg>
                <span class="ring-val" id="st-thirst">100</span>
            </div>
            <div class="status-ring" data-stat="stamina" title="Stamina">
                <svg class="ring-ico"><use href="#ic-stamina"/></svg>
                <span class="ring-val" id="st-stamina">100</span>
            </div>
            <div class="status-ring hidden" data-stat="oxygen" id="ring-oxygen" title="Oxigén">
                <svg class="ring-ico"><use href="#ic-oxygen"/></svg>
                <span class="ring-val" id="st-oxygen">100</span>
            </div>
            <div class="status-ring voice-ring" data-stat="voice" id="ring-voice" title="Voice">
                <svg class="ring-ico"><use href="#ic-voice"/></svg>
            </div>
        </section>

        <!-- ===================== JÁRMŰ (jobb alul) - analóg km/h óra ===================== -->
        <section id="vehicle" class="module-vehicle hidden">
            <div class="gauge">
                <svg class="gauge-svg" viewBox="0 0 200 200" aria-hidden="true">
                    <defs>
                        <linearGradient id="rpmGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0"   stop-color="#3ddc84" />
                            <stop offset="0.6" stop-color="#ffd166" />
                            <stop offset="1"   stop-color="#ff5d5d" />
                        </linearGradient>
                    </defs>

                    <!-- RPM ív -->
                    <circle class="gauge-rpm-bg"   cx="100" cy="100" r="92"
                            stroke-dasharray="433.5 578.1" />
                    <circle class="gauge-rpm-fill" id="veh-rpm-arc" cx="100" cy="100" r="92"
                            stroke-dasharray="433.5 578.1" stroke-dashoffset="433.5" />

                    <!-- skálabeosztás (JS tölti fel) -->
                    <g id="gauge-ticks"></g>
                </svg>

                <div class="gauge-gear" id="veh-gear">N</div>

                <div class="gauge-center">
                    <div class="gauge-speed" id="veh-speed">0</div>
                    <div class="gauge-unit" id="veh-unit">km/h</div>
                </div>

                <div class="gauge-needle" id="veh-needle"></div>
                <div class="gauge-hub"></div>
            </div>

            <div class="veh-info">
                <div class="veh-bar" title="Üzemanyag">
                    <svg class="veh-ico"><use href="#ic-thirst"/></svg>
                    <div class="bar-track"><div class="bar-fill fuel" id="veh-fuel-bar"></div></div>
                    <span class="bar-val" id="veh-fuel">0%</span>
                </div>
                <div class="veh-bar" title="Motor állapot">
                    <svg class="veh-ico"><use href="#ic-armor"/></svg>
                    <div class="bar-track"><div class="bar-fill engine" id="veh-engine-bar"></div></div>
                    <span class="bar-val" id="veh-engine">100%</span>
                </div>
                <div class="veh-footer">
                    <span class="seatbelt off" id="veh-seatbelt">ÖV</span>
                </div>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
